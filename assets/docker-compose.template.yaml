version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      # For Chinese network environments, uncomment:
      # args:
      #   GOPROXY: "https://goproxy.cn,direct"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # IMPORTANT: Hardcode values as explicit strings.
      # ${VAR} syntax is silently overridden by the host shell environment.
      DATABASE_URL: "postgres://app:app@postgres:5432/app?sslmode=disable"
      PORT: "8080"
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
    depends_on:
      - api
    environment:
      # Read at RUNTIME by src/app/api/[[...path]]/route.ts proxy.
      # NOT used by Next.js rewrites (which would bake it at build time).
      INTERNAL_API_BASE_URL: "http://api:8080"
    ports:
      - "3000:3000"

volumes:
  postgres-data:
